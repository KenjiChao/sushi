<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Reads</title>
  <link rel="stylesheet" href="_style.css" />
  <style>
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 2rem;
    }

    .article-card {
      display: block;
      text-decoration: none;
      padding: 20px 0;
      border-bottom: 1px solid #1e1e30;
      transition: padding-left 0.15s;
    }

    .article-card:hover {
      padding-left: 8px;
      text-decoration: none;
    }

    .article-card .title {
      font-size: 1.05rem;
      font-weight: 500;
      color: #e8eaf0;
      margin-bottom: 6px;
      transition: color 0.15s;
    }

    .article-card:hover .title {
      color: #ffffff;
    }

    .article-card .meta {
      font-size: 0.8rem;
      color: #555a72;
      display: flex;
      gap: 12px;
    }

    .article-card .source {
      color: #555a72;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1>Deep Reads <span style="font-weight:400; color: #888; font-size: 0.6em;">· 精選 AI 深度好文</span></h1>
      <p style="font-size: 0.85rem; color: #888; margin-top: 0.25rem;">Curated by 矽谷輕鬆談 Kenji</p>
    </header>

    <main>
      <div class="article-list" style="border-top: 1px solid #1e1e30;">
        <a class="article-card" href="harness-engineering.html">
          <div class="title">駕馭工程：在 Agent 優先的世界裡善用 Codex</div>
          <div class="meta">
            <span class="date">2026 年 2 月 11 日</span>
            <span class="source">OpenAI</span>
          </div>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
